<!doctype html>
<html>
  
  <head>
    <meta charset="utf-8">
    <title>{{ page.title }}</title>

    <!-- font stuff -->
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;1,100;1,400&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  
    <!-- latex stuff -->
    <script>
      MathJax = {
        tex: {
          tags: 'ams',
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          macros: {
                bold: ['{\bf #1}',1],
                ddfrac: ['{\frac{\displaystyle #1}{\displaystyle #2}}', 2],
                abs: ['\left\lvert #2 \right\rvert_{\text{#1}}', 2, ""],
                floor: ['\left\lfloor #2 \right\rfloor_{\text{#1}}', 2, ""],
                sfrac: ['{ \frac {\ #1 \ }{#2}}', 2],
                lcm: ['\operatorname{lcm}#1', 1],
                bbn: ['\\mathbb{N}'],
                bbp: ['\\mathbb{P}'],
                bbq: ['\\mathbb{Q}'],
                bbr: ['\\mathbb{R}'],
                cala: ['\\mathcal{A}'],
                calb: ['\\mathcal{B}'],
                calf: ['\\mathcal{F}'],
                call: ['\\mathcal{L}'],
                calm: ['\\mathcal{M}'],
                calx: ['\\mathcal{X}'],
                caly: ['\\mathcal{Y}'],
                calz: ['\\mathcal{Z}'],
                mfa: ['\\mathfrak{A}'],
                mfb: ['\\mathfrak{B}'],
                mfj: ['\\mathfrak{J}'],
                mfl: ['\\mathfrak{L}'],
                mfm: ['\\mathfrak{M}'],
                tts: ['\\mathtt{S}'],
                ttt: ['\\mathtt{T}'],
                dev: ['\\varepsilon'],
                bd: ['\\partial'],
                dx: ['{\\ \\text{d} #1}', 1]
          },
        },
        svg: {
          fontCache: 'global',
          mtextInheritFont: true,
          }
      };
    </script>

    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>

    <script type="text/javascript" id="MathJax-script" async
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js">
    </script>

  </head>
  
  <body>
    
    {% include navigation-post.html %}
    
    <article class="post-content">
        {{ content }}
    </article>
    
  </body>
</html>
